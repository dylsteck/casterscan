name: CI

on:
  push:
    branches: [main, feat/data-layer-implementation]
  pull_request:
    branches: [main, feat/data-layer-implementation]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
